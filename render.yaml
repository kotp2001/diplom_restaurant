services:
  - type: web
    name: ais-obshepit
    runtime: python
    repo: https://github.com/kotp2001/diplom_restaurant.git
    plan: free
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn restaurant_project.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: diplom-db
          property: connectionString
      - key: RENDER_EXTERNAL_HOSTNAME
        value: ais-obshepit.onrender.com

databases:
  - name: diplom-db
    databaseName: ais_db
    user: ais_user
    plan: free
    region: frankfurt